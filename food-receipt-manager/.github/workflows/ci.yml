name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build and start containers
      run: |
        docker compose up -d --build
        sleep 10
        
    - name: Run Backend Application Logic Tests
      run: |
        docker compose exec -T backend python manage.py test api.tests
        
    - name: Test API Connectivity
      run: |
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/inventory/)
        if [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 200 ]; then
          echo "API Connectivity passed."
        else
          echo "API Connectivity failed: $HTTP_STATUS"
          exit 1
        fi
        
    - name: Tear down
      run: docker compose down
